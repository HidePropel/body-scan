<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>체성분 스캐너</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --warn: #ff6b6b;
    --text: #e8f0fe;
    --muted: #4a6080;
    --card: #141e30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: 0.2;
    pointer-events: none; z-index: 0;
  }

  .glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .glow.a { width: 500px; height: 500px; background: rgba(0,212,170,0.07); top: -150px; left: -100px; }
  .glow.b { width: 500px; height: 500px; background: rgba(0,153,255,0.06); bottom: -150px; right: -100px; }

  .app { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 28px 16px 100px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 28px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3);
    color: var(--accent); font-size: 10px; font-weight: 700; letter-spacing: 1.8px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
  }
  .header h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .header p { color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* API KEY PANEL */
  .apikey-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px; margin-bottom: 20px; transition: border-color 0.3s;
  }
  .apikey-panel.ok { border-color: rgba(0,212,170,0.4); }
  .apikey-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .apikey-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--warn); box-shadow: 0 0 6px var(--warn); transition: all 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .apikey-toggle {
    font-size: 11px; color: var(--muted); cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 8px; font-family: inherit;
  }
  .apikey-body.hidden { display: none; }
  .apikey-input-row { display: flex; gap: 8px; }
  .apikey-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 11px 14px; outline: none; min-width: 0; transition: border-color 0.2s;
  }
  .apikey-input:focus { border-color: var(--accent); }
  .apikey-input::placeholder { color: var(--muted); }
  .btn-save-key {
    padding: 11px 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #000; font-weight: 700; font-size: 13px;
    cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .apikey-hint { margin-top: 10px; font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--muted); flex-wrap: wrap; }
  .apikey-hint.saved { color: var(--accent); }
  .apikey-hint a { color: var(--accent2); text-decoration: none; margin-left: auto; }

  /* UPLOAD ZONE */
  .upload-zone {
    background: var(--card); border: 2px dashed var(--border);
    border-radius: 20px; padding: 36px 20px; text-align: center;
    cursor: pointer; transition: all 0.25s; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(0,212,170,0.04); }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 16px; z-index: 2; }
  .upload-icon {
    width: 60px; height: 60px; margin: 0 auto 14px;
    background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(0,153,255,0.15));
    border: 1px solid rgba(0,212,170,0.2); border-radius: 18px;
    display: flex; align-items: center; justify-content: center; font-size: 28px;
  }
  .upload-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone p { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .upload-hint {
    display: inline-block; margin-top: 12px; font-size: 11px; color: var(--accent);
    background: rgba(0,212,170,0.08); padding: 4px 12px; border-radius: 8px;
  }

  /* CAMERA BUTTONS */
  .camera-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .btn-cam {
    flex: 1; padding: 13px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    font-family: inherit; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .btn-cam input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 16px; }
  .btn-cam:active { border-color: var(--accent); color: var(--accent); }

  /* PREVIEW */
  .preview-wrap {
    display: none; margin-bottom: 16px; border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); position: relative;
  }
  .preview-wrap img { width: 100%; max-height: 260px; object-fit: contain; background: var(--surface); display: block; }
  .preview-action-bar { position: absolute; top: 10px; right: 10px; }
  .preview-action-bar button {
    background: rgba(10,15,30,0.85); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 6px 12px;
    border-radius: 8px; cursor: pointer; backdrop-filter: blur(8px); font-family: inherit;
  }

  /* ANALYZE BUTTON */
  .btn-analyze {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 14px; color: #000;
    font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 20px; transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(0,212,170,0.25);
    -webkit-appearance: none; display: none;
  }
  .btn-analyze.visible { display: flex; }
  .btn-analyze:disabled { opacity: 0.55; cursor: not-allowed; }

  /* LOADING */
  .loading-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
  .loading-wrap.visible { display: flex; }
  .scan-anim { width: 72px; height: 72px; position: relative; }
  .scan-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid transparent; border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  .scan-ring:nth-child(2) { inset: 8px; border-top-color: var(--accent2); animation-duration: 0.7s; animation-direction: reverse; }
  .scan-ring:nth-child(3) { inset: 18px; border-top-color: rgba(0,212,170,0.4); animation-duration: 1.5s; }
  .scan-dot {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 12px var(--accent); animation: pulse 1s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%,100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
    50% { opacity:0.4; transform:translate(-50%,-50%) scale(0.6); }
  }
  .loading-text { font-size: 14px; color: var(--muted); }
  .loading-step { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; min-height: 20px; text-align: center; }

  /* ERROR */
  .error-box {
    display: none; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 16px;
    font-size: 13px; color: #ff9999; line-height: 1.7; white-space: pre-line;
  }

  /* RESULTS */
  .results-wrap { display: none; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .results-header h2 { font-size: 16px; font-weight: 700; }
  .conf-badge {
    font-size: 11px; color: var(--accent);
    background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.25);
    padding: 4px 10px; border-radius: 20px; font-family: 'DM Mono', monospace;
  }
  .section-lbl { font-size: 10px; letter-spacing: 1.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin: 16px 0 10px; }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .field-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px;
    animation: slideUp 0.35s ease forwards; opacity: 0;
  }
  .field-card.missing { border-color: rgba(255,107,107,0.25); background: rgba(255,107,107,0.03); }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .f-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 7px; }
  .f-row { display: flex; align-items: center; gap: 6px; }
  .f-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500;
    padding: 6px 9px; transition: border-color 0.2s;
    -moz-appearance: textfield; -webkit-appearance: none;
  }
  .f-input::-webkit-inner-spin-button, .f-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .f-input:focus { outline: none; border-color: var(--accent); }
  .f-unit { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .f-missing { font-size: 10px; color: var(--warn); margin-top: 5px; }

  /* ACTIONS */
  .action-row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; -webkit-appearance: none; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-solid { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; font-weight: 700; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--accent); padding: 12px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 500; transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 28px; line-height: 1.7; }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .app { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div class="glow a"></div>
<div class="glow b"></div>

<div class="app">

  <div class="header">
    <div class="badge">✦ BODY SCAN MVP</div>
    <h1>체성분 자동 스캐너</h1>
    <p>측정 결과지 사진 한 장으로<br>체성분 수치를 자동 입력합니다</p>
  </div>

  <div class="apikey-panel" id="apikeyPanel">
    <div class="apikey-header">
      <div class="apikey-title">
        <span class="status-dot" id="statusDot"></span>
        Anthropic API Key
      </div>
      <button class="apikey-toggle" id="toggleBtn" onclick="toggleKey()">숨기기</button>
    </div>
    <div class="apikey-body" id="apikeyBody">
      <div class="apikey-input-row">
        <input class="apikey-input" type="password" id="apikeyInput"
          placeholder="sk-ant-api03-…" autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter') saveKey()">
        <button class="btn-save-key" onclick="saveKey()">저장</button>
      </div>
      <div class="apikey-hint" id="apikeyHint">
        키를 입력하고 저장하세요 — 이 기기에만 저장됩니다
        <a href="https://console.anthropic.com/settings/keys" target="_blank">키 발급 →</a>
      </div>
    </div>
  </div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="upload-icon">🗂️</div>
    <h3>결과지 이미지 선택</h3>
    <p>파일 탐색기에서 선택하거나<br>드래그해서 올려주세요</p>
    <span class="upload-hint">JPG · PNG · WEBP · HEIC 지원</span>
  </div>

  <div class="camera-row">
    <button class="btn-cam">
      <input type="file" id="cameraInput" accept="image/*" capture="environment">
      📷 카메라 촬영
    </button>
    <button class="btn-cam">
      <input type="file" id="galleryInput" accept="image/*">
      🖼 갤러리 선택
    </button>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="미리보기">
    <div class="preview-action-bar">
      <button onclick="resetAll()">✕ 다시 선택</button>
    </div>
  </div>

  <button class="btn-analyze" id="btnAnalyze" onclick="analyzeImage()">
    🔍 AI로 수치 자동 추출
  </button>

  <div class="error-box" id="errorBox"></div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="scan-anim">
      <div class="scan-ring"></div><div class="scan-ring"></div>
      <div class="scan-ring"></div><div class="scan-dot"></div>
    </div>
    <p class="loading-text">이미지 분석 중…</p>
    <p class="loading-step" id="loadingStep"></p>
  </div>

  <div class="results-wrap" id="resultsWrap">
    <div class="results-header">
      <h2>📋 추출된 체성분</h2>
      <span class="conf-badge" id="confBadge">분석 완료</span>
    </div>
    <div class="section-lbl">측정 항목</div>
    <div class="fields-grid" id="fieldsGrid"></div>
    <div class="action-row">
      <button class="btn btn-ghost" onclick="resetAll()">↩ 다시 촬영</button>
      <button class="btn btn-solid" onclick="copyData()">📋 복사</button>
    </div>
  </div>

  <div class="footer">
    이미지는 분석 후 서버에 저장되지 않습니다<br>
    API Key는 이 기기의 브라우저에만 저장됩니다<br>
    Powered by Claude Sonnet
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FIELDS = [
  { key:'height',       label:'키',             unit:'cm' },
  { key:'weight',       label:'몸무게',          unit:'kg' },
  { key:'bone_mass',    label:'골격근량',        unit:'kg' },
  { key:'fat_mass',     label:'체지방량',        unit:'kg' },
  { key:'fat_pct',      label:'체지방률',        unit:'%'  },
  { key:'arm_r_muscle', label:'오른팔 근육량',   unit:'kg' },
  { key:'arm_r_pct',    label:'오른팔 근육률',   unit:'%'  },
  { key:'arm_l_muscle', label:'왼팔 근육량',     unit:'kg' },
  { key:'arm_l_pct',    label:'왼팔 근육률',     unit:'%'  },
  { key:'trunk_muscle', label:'몸통 근육량',     unit:'kg' },
  { key:'trunk_pct',    label:'몸통 근육률',     unit:'%'  },
  { key:'leg_r_muscle', label:'오른다리 근육량', unit:'kg' },
  { key:'leg_r_pct',    label:'오른다리 근육률', unit:'%'  },
  { key:'leg_l_muscle', label:'왼다리 근육량',   unit:'kg' },
  { key:'leg_l_pct',    label:'왼다리 근육률',   unit:'%'  },
];

const STEPS = ['이미지 압축 중…','API 전송 중…','Claude 분석 중…','항목 매핑 중…','결과 정리 중…'];
const KEY_NAME = 'body_scan_ak';
let currentFile = null;

// ── API KEY ──
function saveKey() {
  const val = document.getElementById('apikeyInput').value.trim();
  if (!val.startsWith('sk-ant-')) {
    showToast('⚠ sk-ant- 로 시작하는 키를 입력하세요'); return;
  }
  localStorage.setItem(KEY_NAME, val);
  updateKeyUI();
  showToast('✓ API Key가 저장되었습니다');
  setTimeout(() => {
    if (!document.getElementById('apikeyBody').classList.contains('hidden')) toggleKey();
  }, 800);
}

function updateKeyUI() {
  const key   = localStorage.getItem(KEY_NAME) || '';
  const panel = document.getElementById('apikeyPanel');
  const dot   = document.getElementById('statusDot');
  const hint  = document.getElementById('apikeyHint');
  const input = document.getElementById('apikeyInput');
  if (key) {
    dot.classList.add('active'); panel.classList.add('ok');
    input.value = key.slice(0,16) + '…' + key.slice(-4);
    hint.className = 'apikey-hint saved';
    hint.innerHTML = '✓ API Key 저장됨 &nbsp;·&nbsp; 탭해서 변경 가능';
  } else {
    dot.classList.remove('active'); panel.classList.remove('ok');
    hint.className = 'apikey-hint';
    hint.innerHTML = '키를 입력하고 저장하세요 — 이 기기에만 저장됩니다'
      + '<a href="https://console.anthropic.com/settings/keys" target="_blank">키 발급 →</a>';
  }
}

let keyOpen = true;
function toggleKey() {
  keyOpen = !keyOpen;
  document.getElementById('apikeyBody').classList.toggle('hidden', !keyOpen);
  document.getElementById('toggleBtn').textContent = keyOpen ? '숨기기' : '펼치기';
}
document.getElementById('apikeyInput').addEventListener('focus', () => {
  const key = localStorage.getItem(KEY_NAME);
  if (key) document.getElementById('apikeyInput').value = key;
});

// ── FILE HANDLING ──
['fileInput','cameraInput','galleryInput'].forEach(id => {
  document.getElementById(id).addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
});
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
});

function handleFile(file) {
  currentFile = file;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('previewImg').src = ev.target.result;
    show('previewWrap'); show('btnAnalyze','flex');
    hide('resultsWrap'); hide('errorBox');
  };
  r.readAsDataURL(file);
}

// ── IMAGE RESIZE (iOS HEIC 및 대용량 이미지 대응) ──
// Canvas로 리사이즈 후 JPEG base64 반환
function resizeImageToBase64(file, maxSize) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.onload = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('이미지를 불러올 수 없습니다. JPG/PNG 파일을 사용해주세요.'));
      img.onload = () => {
        try {
          let { width, height } = img;
          // 긴 변이 maxSize 초과 시 축소
          if (width > maxSize || height > maxSize) {
            if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
            else                { width  = Math.round(width  * maxSize / height); height = maxSize; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          // quality 0.85로 JPEG 변환
          const dataURL = canvas.toDataURL('image/jpeg', 0.85);
          const b64 = dataURL.split(',')[1];
          resolve(b64);
        } catch (err) {
          reject(new Error('이미지 처리 중 오류: ' + err.message));
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── ANALYZE ──
async function analyzeImage() {
  const apiKey = localStorage.getItem(KEY_NAME);
  if (!apiKey) { showError('API Key를 먼저 입력하고 저장해주세요.'); return; }
  if (!currentFile) { showError('이미지를 먼저 선택해주세요.'); return; }

  const btn = document.getElementById('btnAnalyze');
  btn.disabled = true;
  show('loadingWrap','flex'); hide('errorBox'); hide('resultsWrap');

  let si = 0;
  const stepEl = document.getElementById('loadingStep');
  stepEl.textContent = STEPS[0];
  const timer = setInterval(() => { si=(si+1)%STEPS.length; stepEl.textContent=STEPS[si]; }, 1400);

  try {
    // 1) 이미지 리사이즈 (최대 1568px — Claude 최적 해상도)
    const b64 = await resizeImageToBase64(currentFile, 1568);

    // 2) API 호출
    const SYS = `당신은 체성분 측정 결과지에서 수치를 추출하는 전문 OCR 시스템입니다.
이미지에서 아래 항목들의 수치를 정확히 읽어서 JSON으로만 응답하세요.
숫자가 보이지 않으면 해당 key는 null로 설정하세요.
단위는 제외하고 숫자만 넣으세요.
JSON 외에 다른 텍스트는 절대 포함하지 마세요.

{
  "height": number|null,
  "weight": number|null,
  "bone_mass": number|null,
  "fat_mass": number|null,
  "fat_pct": number|null,
  "arm_r_muscle": number|null,
  "arm_r_pct": number|null,
  "arm_l_muscle": number|null,
  "arm_l_pct": number|null,
  "trunk_muscle": number|null,
  "trunk_pct": number|null,
  "leg_r_muscle": number|null,
  "leg_r_pct": number|null,
  "leg_l_muscle": number|null,
  "leg_l_pct": number|null,
  "_confidence": "high"|"medium"|"low",
  "_note": "string"
}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYS,
        messages: [{
          role: 'user',
          content: [
            // 리사이즈된 JPEG로 항상 전송
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text',  text: '이 이미지에서 체성분 수치를 추출해주세요.' }
          ]
        }]
      })
    });

    clearInterval(timer);

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const msg = errBody?.error?.message || '';
      if (res.status === 401) throw new Error('API Key가 올바르지 않습니다.\n키를 다시 확인하고 저장해주세요.');
      if (res.status === 402) throw new Error('크레딧이 부족합니다.\nconsole.anthropic.com/settings/billing 에서 충전해주세요.');
      if (res.status === 429) throw new Error('요청이 너무 많습니다.\n잠시 후 다시 시도해주세요.');
      if (res.status === 400) throw new Error('잘못된 요청입니다. (400)\n' + msg);
      if (res.status === 500) throw new Error('서버 오류입니다. (500)\n잠시 후 다시 시도해주세요.');
      throw new Error(`오류 코드: ${res.status}\n${msg}`);
    }

    const data = await res.json();
    const raw  = data?.content?.[0]?.text;
    if (!raw) throw new Error('응답이 비어있습니다. 다시 시도해주세요.');

    const m = raw.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('응답 파싱 실패.\n이미지가 체성분 결과지인지 확인해주세요.');

    renderResults(JSON.parse(m[0]));

  } catch (e) {
    clearInterval(timer);
    // TypeError 등 예상 외 에러도 명확히 표시
    const msg = e instanceof TypeError
      ? '네트워크 오류가 발생했습니다.\n인터넷 연결을 확인하고 다시 시도해주세요.\n(상세: ' + e.message + ')'
      : e.message;
    showError(msg);
  } finally {
    hide('loadingWrap');
    btn.disabled = false;
  }
}

// ── RENDER ──
function renderResults(data) {
  const grid = document.getElementById('fieldsGrid');
  grid.innerHTML = '';
  let found = 0;
  FIELDS.forEach((f, i) => {
    const v   = data[f.key];
    const has = v !== null && v !== undefined && v !== '';
    if (has) found++;
    const card = document.createElement('div');
    card.className = 'field-card' + (has ? '' : ' missing');
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="f-label">${f.label}</div>
      <div class="f-row">
        <input class="f-input" type="number" step="any"
          value="${has ? v : ''}" placeholder="—" data-key="${f.key}">
        <span class="f-unit">${f.unit}</span>
      </div>
      ${!has ? '<div class="f-missing">⚠ 직접 입력 필요</div>' : ''}
    `;
    grid.appendChild(card);
  });
  const c = data._confidence || 'medium';
  const lbl = { high:'✓ 고신뢰', medium:'△ 보통', low:'! 낮음' };
  document.getElementById('confBadge').textContent = `${lbl[c]||'완료'} · ${found}/${FIELDS.length}`;
  show('resultsWrap');
}

// ── COPY ──
function copyData() {
  const lines = [];
  document.querySelectorAll('.f-input').forEach(inp => {
    if (inp.value) {
      const f = FIELDS.find(x => x.key === inp.dataset.key);
      if (f) lines.push(`${f.label}: ${inp.value} ${f.unit}`);
    }
  });
  navigator.clipboard.writeText(lines.join('\n'))
    .then(() => showToast('📋 클립보드에 복사됨'))
    .catch(() => showToast('⚠ 복사 실패'));
}

// ── RESET ──
function resetAll() {
  currentFile = null;
  ['fileInput','cameraInput','galleryInput'].forEach(id => document.getElementById(id).value = '');
  hide('previewWrap'); hide('btnAnalyze'); hide('resultsWrap'); hide('loadingWrap'); hide('errorBox');
}

// ── UTILS ──
function show(id, d='block') { const e=document.getElementById(id); if(e) e.style.display=d; }
function hide(id) { const e=document.getElementById(id); if(e) e.style.display='none'; }
function showError(msg) {
  const e = document.getElementById('errorBox');
  e.textContent = '⚠ ' + msg; e.style.display = 'block';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
updateKeyUI();
['previewWrap','btnAnalyze','resultsWrap','loadingWrap','errorBox'].forEach(hide);
</script>
